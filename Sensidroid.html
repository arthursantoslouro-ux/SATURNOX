<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENSIDRØID</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --panel:#110808;
  --text:#f5f5f5;
  --muted:#9ca3af;
  --accent:#dc2626;
}

body{
  margin:0;
  font-family:'DM Sans',system-ui;
  background:linear-gradient(180deg, #140707 0%, #0a0a0a 60%);
  color:var(--text);
}

.topbar{
  height:56px;
  display:flex;
  align-items:center;
  padding:0 16px;
  background:rgba(10,5,5,0.85);
  backdrop-filter:blur(12px);
}

.title{
  margin-left:10px;
  font-family:'Rajdhani';
  font-weight:700;
  letter-spacing:2px;
  background:linear-gradient(90deg,#ef4444,#fca5a5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.menu-btn{
  width:36px;
  height:36px;
  background:none;
  border:none;
}

.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:var(--panel);
  transition:.25s;
  padding-top:60px;
}

.sidebar.open{ left:0; }

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:.2s;
}
.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.item{
  padding:14px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  color:var(--muted);
  border-left:3px solid transparent;
}
.item:hover{
  background:rgba(220,38,38,0.08);
  border-left:3px solid #dc2626;
  color:white;
}
.item.active{
  border-left:3px solid #dc2626;
  color:white;
}

.main{
  padding:16px;
}

.box{
  background:var(--panel);
  border-radius:16px;
  padding:14px;
  margin-bottom:16px;
  border:1px solid rgba(220,38,38,0.3);
  box-shadow:0 0 0 1px rgba(220,38,38,0.15), 0 8px 32px rgba(0,0,0,0.4);
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid rgba(220,38,38,0.2);
  background:#0f0606;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#dc2626,#7f1d1d);
  color:white;
  font-weight:600;
  cursor:pointer;
}

.btn2{
  background:#1f2937;
}

.field{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.small{
  width:40px;
  border-radius:10px;
  background:#1f2937;
}

.card{
  margin-top:10px;
  padding:10px;
  border-left:4px solid #dc2626;
  border-radius:12px;
  background:#0f0606;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
  <div class="item active" onclick="show('home');setActive(this);toggleMenu()">🏠 Home</div>
  <div class="item" onclick="show('create');setActive(this);toggleMenu()">➕ Criar</div>
</div>

<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <div class="title">SENSIDRØID</div>
</div>

<div class="main">

<div id="home" class="box">
  <h3>Sensis</h3>

  <div style="display:flex;gap:8px;">
    <input id="search" placeholder="Buscar por nome..." oninput="filtrar()">
    <input id="filtroData" type="date" onchange="filtrar()" style="max-width:150px;">
  </div>

  <div id="lista"></div>
</div>

<div id="create" class="box" style="display:none">
<h3>Criar Sensi</h3>

<input id="nome" placeholder="Nome da sensi">
<div id="fields"></div>

<button class="btn2" onclick="addField()">+ Adicionar campo</button>
<button onclick="salvar()">Salvar Sensi</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "sensidroidff.firebaseapp.com",
  projectId: "sensidroidff",
  storageBucket: "sensidroidff.firebasestorage.app",
  messagingSenderId: "781286649372",
  appId: "1:781286649372:web:844e4890eaf08e3e3c79d9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let listaDados = [];

/* MENU */
window.toggleMenu = () => {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
};

window.show = (p) => {
  home.style.display = p==="home"?"block":"none";
  create.style.display = p==="create"?"block":"none";
};

window.setActive = (el)=>{
  document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
};

/* CAMPOS */
window.addField = () => {
  const div = document.createElement("div");
  div.className = "field";

  div.innerHTML = `
    <input placeholder="Nome">
    <input placeholder="Valor">
    <button class="small" onclick="this.parentElement.remove()">✕</button>
  `;

  fields.appendChild(div);
};

/* DATA */
function formatarData(dataStr){
  let data = dataStr ? new Date(dataStr) : new Date();

  if(isNaN(data.getTime())){
    data = new Date();
  }

  let hoje = new Date();
  let ontem = new Date();
  ontem.setDate(hoje.getDate()-1);

  let mesma = (a,b)=>
    a.getFullYear()===b.getFullYear() &&
    a.getMonth()===b.getMonth() &&
    a.getDate()===b.getDate();

  if(mesma(data,hoje)) return "Hoje";
  if(mesma(data,ontem)) return "Ontem";

  return data.toLocaleDateString();
}

/* SALVAR */
window.salvar = async () => {

  let obj = { 
    nome: nome.value || "sem nome",
    data: new Date().toISOString()
  };

  document.querySelectorAll(".field").forEach(f=>{
    let k = f.children[0].value;
    let v = f.children[1].value;
    if(k) obj[k] = v || "0";
  });

  await addDoc(collection(db,"sensis"), obj);

  fields.innerHTML="";
  nome.value="";
};

/* COPIAR */
window.copiarSensi = async (d) => {
  let texto = `${d.nome}\n\n`;

  Object.keys(d).forEach(k=>{
    if(k !== "nome" && k !== "data"){
      texto += `${k}: ${d[k]}\n`;
    }
  });

  await navigator.clipboard.writeText(texto);
  alert("Copiado!");
};

/* RENDER */
function render(listaFiltrada){

  // ordena por mais recente
  listaFiltrada.sort((a,b)=>{
    let da = new Date(a.data || 0).getTime();
    let db = new Date(b.data || 0).getTime();
    return db - da;
  });

  lista.innerHTML="";

  listaFiltrada.forEach(d=>{
    let html = `<div class="card">
      <div style="display:flex;justify-content:space-between;">
        <b>${d.nome}</b>
        <small>${formatarData(d.data)}</small>
      </div>
      <button onclick='copiarSensi(${JSON.stringify(d)})' style="width:auto;padding:6px 10px;font-size:12px;margin-top:5px;">
        Copiar
      </button><br>`;

    Object.keys(d).forEach(k=>{
      if(k !== "nome" && k !== "data"){
        html += `${k}: ${d[k]}<br>`;
      }
    });

    html += `</div>`;
    lista.innerHTML += html;
  });
}

/* FILTRO */
window.filtrar = () => {
  let q = search.value.toLowerCase();
  let dataFiltro = filtroData.value;

  let filtrado = listaDados.filter(d => {

    let nomeOk = (d.nome || "").toLowerCase().includes(q);

    if(!dataFiltro) return nomeOk;

    if(!d.data) return false;

    let dataObj = new Date(d.data);

    let ano = dataObj.getFullYear();
    let mes = String(dataObj.getMonth()+1).padStart(2,'0');
    let dia = String(dataObj.getDate()).padStart(2,'0');

    let dataItem = `${ano}-${mes}-${dia}`;

    return nomeOk && dataItem === dataFiltro;
  });

  render(filtrado);
};

/* SNAPSHOT */
onSnapshot(collection(db,"sensis"), snap=>{
  listaDados = [];

  snap.forEach(doc=>{
    listaDados.push(doc.data());
  });

  render(listaDados);
});
</script>

</body>
</html>
